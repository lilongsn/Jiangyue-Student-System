<!DOCTYPE html>
<html>
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-indigo-100 flex items-center justify-center h-screen">
    <form method="POST" class="bg-white/60 backdrop-blur-xl p-10 rounded-[40px] shadow-2xl w-96 border border-white/40">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-gray-800">简予</h1>
            <p class="text-gray-400 text-sm">JIANGYUE STUDENT SYSTEM</p>
        </div>
        <input type="text" name="username" placeholder="账号" class="w-full mb-4 p-4 rounded-2xl bg-white/50 outline-none focus:ring-2 focus:ring-indigo-400 transition">
        <input type="password" name="password" placeholder="密码" class="w-full mb-8 p-4 rounded-2xl bg-white/50 outline-none focus:ring-2 focus:ring-indigo-400 transition">
        <button class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold hover:shadow-lg transition active:scale-95">开启管理</button>
        {% with messages = get_flashed_messages() %}
            {% if messages %}<p class="text-red-500 text-xs mt-4 text-center">{{ messages[0] }}</p>{% endif %}
        {% endwith %}
    </form>
</body>
</html>
