{% extends "base.html" %}
{% block content %}
<div class="mb-10">
    <h1 class="text-4xl font-black text-gray-800 tracking-tight">成绩中心</h1>
</div>

<div class="bg-white/50 backdrop-blur-md rounded-[2rem] border border-white/40 shadow-lg overflow-hidden">
    <table class="w-full text-left">
        <thead class="bg-white/30 text-gray-500 uppercase text-xs font-bold">
            <tr>
                <th class="p-6">学号</th>
                <th class="p-6">姓名</th>
                <th class="p-6">专业</th>
                <th class="p-6">综合评分</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-white/20">
            {% for s in students %}
            <tr class="hover:bg-white/40 transition">
                <td class="p-6 font-mono">{{ s.student_id }}</td>
                <td class="p-6 font-bold text-gray-800">{{ s.name }}</td>
                <td class="p-6 text-gray-600">{{ s.major }}</td>
                <td class="p-6">
                    <span class="px-3 py-1 bg-indigo-100 text-indigo-600 rounded-full text-xs font-bold">85.0 (模拟)</span>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
