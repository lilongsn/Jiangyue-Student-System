{% extends "base.html" %}
{% block content %}
<div class="flex justify-between items-center mb-8">
    <h2 class="text-3xl font-bold">成绩录入与审计</h2>
    <div class="flex gap-2">
        <button class="bg-black text-white px-4 py-2 rounded-full text-sm">批量导入 Excel</button>
    </div>
</div>

<div class="space-y-4">
    {% for g in grades %}
    <div class="glass p-6 bg-white/20 flex justify-between items-center border-none">
        <div>
            <h4 class="font-bold text-lg">{{ g.student.name }} <span class="text-sm font-normal text-gray-500">({{ g.course_name }})</span></h4>
            <p class="text-xs text-gray-400">最后操作: {{ g.logs[-1].operator if g.logs else '系统初始' }}</p>
        </div>
        <form action="/grade/edit/{{ g.id }}" method="POST" class="flex gap-4 items-center">
            <input type="number" name="score" value="{{ g.score }}" class="w-20 p-2 bg-white/50 rounded-lg text-center font-bold">
            <button class="text-blue-600 font-bold text-sm">更新</button>
            <button type="button" onclick="alert('修改历史：\n{% for log in g.logs %}{{ log.operate_time }}: {{ log.old_score }} -> {{ log.new_score }} ({{ log.operator }})\n{% endfor %}')" class="text-gray-500 text-sm">查看留痕</button>
        </form>
    </div>
    {% endfor %}
</div>
{% endblock %}
