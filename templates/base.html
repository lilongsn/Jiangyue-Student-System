<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>简予 JIANGYUE - 管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(15px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.3); }
        .sidebar-link:hover { background: rgba(255,255,255,0.2); transform: translateX(5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="p-6">
    <div class="flex gap-6 max-w-7xl mx-auto h-[90vh]">
        <aside class="w-64 glass p-8 flex flex-col justify-between shadow-2xl">
            <div>
                <h1 class="text-2xl font-bold text-gray-800 mb-10 tracking-tighter">简予 JIANGYUE</h1>
                <nav class="space-y-4">
                    <a href="/" class="block p-3 rounded-xl sidebar-link text-gray-700">📊 数据看板</a>
                    <a href="/students" class="block p-3 rounded-xl sidebar-link text-gray-700">👥 学生管理</a>
                    <a href="/grades" class="block p-3 rounded-xl sidebar-link text-gray-700 font-bold">💯 成绩中心</a>
                </nav>
            </div>
            <div class="border-t border-white/20 pt-4">
                <p class="text-xs text-gray-500">角色: {{ current_user.role }}</p>
                <a href="/logout" class="text-red-500 text-sm mt-2 block">退出系统</a>
            </div>
        </aside>
        <main class="flex-1 glass p-10 overflow-y-auto shadow-2xl">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
