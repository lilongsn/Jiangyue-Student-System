{% extends "base.html" %}
{% block content %}
<h2 class="text-3xl font-bold mb-8">{{ '修改' if student else '新增' }}学生档案</h2>
<form method="POST" class="max-w-md space-y-6">
    <div>
        <label class="block text-sm mb-2 text-gray-600">学号</label>
        <input type="text" name="sid" value="{{ student.student_id if student else '' }}" class="w-full p-3 rounded-xl bg-white/50 border border-white/30 outline-none focus:ring-2 focus:ring-blue-400">
    </div>
    <div>
        <label class="block text-sm mb-2 text-gray-600">姓名</label>
        <input type="text" name="name" value="{{ student.name if student else '' }}" class="w-full p-3 rounded-xl bg-white/50 border border-white/30 outline-none focus:ring-2 focus:ring-blue-400">
    </div>
    <div class="grid grid-cols-2 gap-4">
        <input type="text" name="major" placeholder="专业" value="{{ student.major if student else '' }}" class="p-3 rounded-xl bg-white/50 border border-white/30">
        <input type="text" name="class_name" placeholder="班级" value="{{ student.class_name if student else '' }}" class="p-3 rounded-xl bg-white/50 border border-white/30">
    </div>
    <button class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-200">保存档案</button>
</form>
{% endblock %}
