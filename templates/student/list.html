{% extends "base.html" %}
{% block content %}
<div class="flex justify-between items-center mb-8">
    <h2 class="text-3xl font-bold">学生名册</h2>
    <a href="/student/form" class="bg-black text-white px-6 py-2 rounded-full hover:scale-105 transition">录入学生</a>
</div>
<table class="w-full text-left">
    <thead>
        <tr class="text-gray-500 border-b border-white/20">
            <th class="py-4">学号</th>
            <th>姓名</th>
            <th>专业班级</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody>
        {% for s in students %}
        <tr class="border-b border-white/10 hover:bg-white/20 transition">
            <td class="py-4 font-mono">{{ s.student_id }}</td>
            <td class="font-bold">{{ s.name }}</td>
            <td>{{ s.major }} / {{ s.class_name }}</td>
            <td>
                <a href="/student/form/{{ s.id }}" class="text-blue-600 mr-4">编辑</a>
                <a href="#" class="text-red-400">删除</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
